<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMO Chabahil | License Print Check</title>
    <style>
        :root {
            --primary: #1a73e8;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .dashboard {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h2 { color: #333; margin-bottom: 0.5rem; }
        p.subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }

        .search-container {
            position: relative;
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
            text-align: center;
            letter-spacing: 1px;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary); }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #1557b0; }

        #resultArea {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            display: none; /* Hidden by default */
        }

        .printed { background-color: #e6f4ea; color: var(--success); border: 1px solid var(--success); }
        .not-printed { background-color: #fce8e6; color: var(--danger); border: 1px solid var(--danger); }
        
        .result-title { font-weight: bold; font-size: 1.2rem; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="dashboard">
    <h2>TMO Chabahil</h2>
    <p class="subtitle">License Print Status Check</p>

    <div class="search-container">
        <input type="text" id="licenseInput" placeholder="00-00-00000000" maxlength="14">
    </div>
    
    <button onclick="checkStatus()">Check Status</button>

    <div id="resultArea">
        <span id="statusText" class="result-title"></span>
        <span id="instructionText"></span>
    </div>
</div>

<script>
    // Auto-format input to 00-00-00000000 while typing
    const input = document.getElementById('licenseInput');
    input.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, ''); // Remove non-digits
        let formatted = '';
        
        if (value.length > 0) {
            formatted += value.substring(0, 2);
            if (value.length > 2) {
                formatted += '-' + value.substring(2, 4);
            }
            if (value.length > 4) {
                formatted += '-' + value.substring(4, 12);
            }
        }
        e.target.value = formatted;
    });

    function checkStatus() {
        const val = input.value;
        const resultArea = document.getElementById('resultArea');
        const statusText = document.getElementById('statusText');
        const instructionText = document.getElementById('instructionText');

        // Simple Regex validation for the format 00-00-00000000
        const pattern = /^\d{2}-\d{2}-\d{8}$/;

        if (!pattern.test(val)) {
            alert("Please enter a valid number in 00-00-00000000 format.");
            return;
        }

        resultArea.style.display = "block";

        // Logic: For this demo, let's say numbers ending in an even digit are "Printed"
        // In a real app, you would connect this to a database API.
        const isFound = parseInt(val.slice(-1)) % 2 === 0;

        if (isFound) {
            resultArea.className = "printed";
            statusText.innerText = "✅ License Printed";
            instructionText.innerText = "Please visit TMO Chabahil to collect your license.";
        } else {
            resultArea.className = "not-printed";
            statusText.innerText = "❌ Not Printed";
            instructionText.innerText = "Your license was not found in the print queue.";
        }
    }
</script>

</body>
</html>
