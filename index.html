<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Delivery Search - TMO Chabahil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            color: #1a202c;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: #718096;
            font-size: 14px;
            font-weight: 500;
        }

        .search-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 2px solid #e2e8f0;
        }

        .tab {
            flex: 1;
            padding: 12px 16px;
            background: none;
            border: none;
            color: #718096;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .tab.active {
            color: #667eea;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #667eea;
        }

        .tab:hover {
            color: #667eea;
        }

        .search-form {
            display: none;
        }

        .search-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #2d3748;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #a0aec0;
        }

        .hint {
            font-size: 12px;
            color: #718096;
            margin-top: 6px;
            display: block;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        button[type="submit"]:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 24px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.success {
            background: #f0fdf4;
            border: 2px solid #86efac;
            display: block;
        }

        .result.error {
            background: #fef2f2;
            border: 2px solid #fca5a5;
            display: block;
        }

        .result-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .result.success .result-title {
            color: #16a34a;
        }

        .result.error .result-title {
            color: #dc2626;
        }

        .result-data {
            background: white;
            padding: 16px;
            border-radius: 6px;
            margin-top: 12px;
        }

        .data-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-label {
            font-weight: 600;
            color: #374151;
            min-width: 140px;
        }

        .data-value {
            color: #1f2937;
            flex: 1;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin-top: 16px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .admin-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }

        .admin-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .admin-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Search License Delivered on TMO Chabahil</h1>
            <p>Enter your details to check license status</p>
        </div>

        <div class="search-tabs">
            <button class="tab active" data-tab="applicant">Applicant ID</button>
            <button class="tab" data-tab="license">License Number</button>
        </div>

        <form id="applicantForm" class="search-form active">
            <div class="form-group">
                <label for="applicantId">Your Applicant ID</label>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="applicantId" 
                        name="applicantId" 
                        placeholder="e.g., 6616133"
                        required
                        pattern="[0-9]{7,10}"
                    >
                </div>
                <span class="hint">Check your revenue bill for your Applicant ID</span>
            </div>
            <button type="submit">Search by Applicant ID</button>
        </form>

        <form id="licenseForm" class="search-form">
            <div class="form-group">
                <label for="licenseNumber">Your License Number</label>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="licenseNumber" 
                        name="licenseNumber" 
                        placeholder="e.g., 03-06-00123456"
                        required
                        pattern="[0-9]{2}-[0-9]{2}-[0-9]{8}"
                    >
                </div>
                <span class="hint">Include hyphens in format: XX-XX-XXXXXXXX</span>
            </div>
            <button type="submit">Search by License Number</button>
        </form>

        <div class="loading">
            <div class="spinner"></div>
            <p>Searching database...</p>
        </div>

        <div id="result" class="result"></div>

        <div class="admin-link">
            <a href="admin.html">Admin Access</a>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
